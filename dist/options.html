<!DOCTYPE html>
<html>

<head>
  <title>VimDocs Settings</title>
  <script type="module" crossorigin src="/assets/options.html-CCfVkX3a.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/options-C8UTofHW.css">
</head>

<body>
  <div class="container">
    <header>
      <h1>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="m18 16 4-4-4-4"></path>
          <path d="m6 8-4 4 4 4"></path>
          <path d="m14.5 4-5 16"></path>
        </svg>
        VimDocs
      </h1>
      <div class="status-toggle">
        <label class="switch">
          <input type="checkbox" id="enabled">
          <span class="slider"></span>
        </label>
      </div>
    </header>

    <div class="section-title">Navigation Keybindings</div>
    <div class="keybinding-list">
      <div class="keybinding-item">
        <div class="keybinding-label">Move Left</div>
        <button type="button" id="left" class="keybinding-btn"></button>
      </div>
      <div class="keybinding-item">
        <div class="keybinding-label">Move Down</div>
        <button type="button" id="down" class="keybinding-btn"></button>
      </div>
      <div class="keybinding-item">
        <div class="keybinding-label">Move Up</div>
        <button type="button" id="up" class="keybinding-btn"></button>
      </div>
      <div class="keybinding-item">
        <div class="keybinding-label">Move Right</div>
        <button type="button" id="right" class="keybinding-btn"></button>
      </div>
    </div>

    <div class="section-title">Mode Shortcuts</div>
    <div class="keybinding-list">
      <div class="keybinding-item">
        <div class="keybinding-label">
          Escape / Return to Normal
          <div class="keybinding-sublabel">ESC always works too</div>
        </div>
        <button type="button" id="customEscape" class="keybinding-btn"></button>
      </div>
    </div>

    <div class="reserved-shorthands">
      <div class="reserved-title">RESERVED SHORTCUTS</div>
      <div class="reserved-item"><span>Esc</span> : Normal Mode (always active)</div>
      <div class="reserved-item"><span>i</span> : Insert Mode</div>
      <div class="reserved-item"><span>v</span> : Visual Mode</div>
      <div class="reserved-item"><span>Ctrl+C</span> : Native Copy</div>
    </div>

    <div class="footer">
      <button id="save" class="btn btn-primary">Save Changes</button>
    </div>
  </div>
</body>

</html>
